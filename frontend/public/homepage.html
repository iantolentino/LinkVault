<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>LinkVault - Dashboard</title>
  <link rel="icon" href="images/vault.png" type="image/x-icon" />
  <link rel="stylesheet" href="style.css?=2.0" />
  <style>
    /* Fallback to ensure cards are same height */
    .section {
        height: 350px !important;
        min-height: 350px !important;
        max-height: 350px !important;
        overflow: hidden !important;
    }
    nav {
        overflow-y: auto !important;
        flex: 1 !important;
    }
</style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="homepage-wrapper">
    <header>
      <div class="navbar">
        <div class="logo">
          LinkVault <span id="user-display-name"></span>
      </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
        <div class="nav-links" id="navLinks">
          <button id="addCategoryBtn">Add Category</button>
          <input class="search-bar" id="searchBar" placeholder="Search Links" />
          <button class="mode-toggle" id="modeToggle">☼</button>
          <button id="formatBtn">Format</button>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>
    </header>

    <div class="homepage-container">
      <div class="container" id="container">
        <!-- Categories will be loaded here -->
      </div>
    </div>
  </div>

  <!-- Format Modal -->
  <div id="formatModal" class="modal">
    <div class="modal-content">
      <h2>Import / Export Data</h2>
      <input type="file" id="formatUpload" accept=".json" /><br /><br />
      <pre id="output" style="max-height: 200px; overflow-y: auto;"></pre>
      <div class="modal-buttons">
        <button id="importBtn">Import Data</button>
        <button id="exportBtn">Export Data</button>
        <button id="applyBtn">Apply Data</button>
        <button id="closeModalBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Edit Link Modal -->
  <div id="editLinkModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeEditLinkModal()">&times;</span>
      <h2>Edit Link</h2>
      <input type="text" id="editLinkTitle" placeholder="Link Title">
      <input type="url" id="editLinkUrl" placeholder="Link URL">
      <input type="hidden" id="editLinkCategory">
      <input type="hidden" id="editLinkOriginalTitle">
      <div class="modal-buttons">
        <button onclick="saveEditedLink()">Save Changes</button>
        <button onclick="closeEditLinkModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Link Modal -->
  <div id="addLinkModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeAddLinkModal()">&times;</span>
      <h2>Add New Link</h2>
      <input type="text" id="addLinkTitle" placeholder="Link Title">
      <input type="url" id="addLinkUrl" placeholder="Link URL">
      <input type="hidden" id="addLinkCategory">
      <div class="modal-buttons">
        <button onclick="saveNewLink()">Add Link</button>
        <button onclick="closeAddLinkModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="loadingSpinner" class="spinner" style="display: none;"></div>
  <div id="notification" class="notification" style="display: none;"></div>

  <!-- Import Map for Firebase -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
  </script>
  
  <!-- Load your scripts from the correct path -->
  <script type="module" src="src/js/firebase-config.js"></script>
  <script type="module" src="src/js/api-client.js"></script>
  <script type="module" src="src/js/homepage.js"></script>
</body>
</html>
