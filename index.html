<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LinkVault</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="./firebase-config.js"></script>
  <script type="module" src="./login.js"></script>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-container">
      <h1><span class="brand-name">LinkVault</span></h1>
      <p class="subtitle">Securely store and access your links anytime, anywhere.</p>
      <button id="google-login" class="login-btn">
        <img src="images/google-icon.png" alt="Google Logo" class="google-icon">
        Login with Google
      </button>
    </div>
  </div>
</body>
</html>
